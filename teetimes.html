<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tee Times — Middletown Area Golf Association</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div id="app-header"></div>

<section class="page-hero">
  <div class="container">
    <h1>Tee Times &amp; Pairings</h1>
    <p>Pairings are posted each Wednesday before the tournament. Check back to find your group and start time.</p>
  </div>
</section>

<main class="page-content">
  <div class="container">

    <!-- Event summary card -->
    <div class="card mb-3" id="event-card">
      <div class="card-head">
        <h2 id="tt-title">Loading&hellip;</h2>
        <span class="badge badge-green">Posted</span>
      </div>
      <div class="card-body">
        <div class="event-meta" id="tt-meta"></div>
      </div>
    </div>

    <div class="section-head"><h2>Pairings</h2></div>
    <div id="tt-groups">
      <div style="color:var(--text-muted);padding:1rem;">Loading tee times&hellip;</div>
    </div>

  </div>
</main>

<div id="app-footer"></div>

<script src="js/nav.js"></script>
<script>
  fetch('data/teetimes.json?v=' + Date.now()).then(r => r.json()).then(data => {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const all = data.tournaments || [];

    /* ── Select active tournament ──────────────────────────────────────
       Priority: posted tournament whose date is today or in the future,
       closest to today. If none upcoming, fall back to the most recently
       past posted tournament. */
    const posted = all.filter(t => t.posted && t.groups && t.groups.length > 0);
    posted.sort((a, b) => new Date(a.date) - new Date(b.date));

    const upcoming = posted.filter(t => new Date(t.date + 'T00:00:00') >= today);
    const past     = posted.filter(t => new Date(t.date + 'T00:00:00') <  today);

    const active = upcoming.length > 0
      ? upcoming[0]
      : past.length > 0 ? past[past.length - 1] : null;

    /* ── Past tee times list (all posted except active) ── */
    const pastList = posted.filter(t => t !== active).reverse();

    /* ── Helper functions ── */
    function fmt1(v) {
      if (v == null) return '—';
      return parseFloat(v).toFixed(1);
    }

    function renderPlayer(p) {
      if (typeof p === 'string') {
        return `<div class="player-row">
          <span class="player-name">${p}</span>
          <span class="player-hdcp">—</span>
          <span class="player-usga">—</span>
          <span class="player-ch">—</span>
          <span class="player-net-cell"></span>
          <span class="player-skins-cell"></span>
        </div>`;
      }
      const hdcp  = fmt1(p.handicapIndex);
      const usga  = fmt1(p.usgaHandicapIndex);
      const ch    = p.courseHandicap != null ? p.courseHandicap : '—';
      const net   = p.isNet   ? `<span class="player-check--net">✓</span>`   : '';
      const skins = p.isSkins ? `<span class="player-check--skins">✓</span>` : '';
      return `<div class="player-row">
        <span class="player-name">${p.name}</span>
        <span class="player-hdcp">${hdcp}</span>
        <span class="player-usga">${usga}</span>
        <span class="player-ch">${ch}</span>
        <span class="player-net-cell">${net}</span>
        <span class="player-skins-cell">${skins}</span>
      </div>`;
    }

    const colHeader = `<div class="player-row-header">
      <span>Player</span>
      <span>HDCP</span>
      <span>USGA</span>
      <span>CH</span>
      <span>Net</span>
      <span>Skins</span>
    </div>`;

    function renderGroups(t) {
      return t.groups.map(g => `
        <div class="tee-group">
          <div class="tee-time-badge">${GolfFmt.time(g.time)}</div>
          <div class="tee-players">
            ${colHeader}
            ${g.players.map(p => renderPlayer(p)).join('')}
          </div>
        </div>`).join('');
    }

    /* ── Render active tournament ── */
    if (!active) {
      document.getElementById('event-card').style.display = 'none';
      document.getElementById('tt-groups').innerHTML = `
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem;text-align:center;">
          <p style="font-size:1rem;font-weight:600;color:var(--text);margin-bottom:0.4rem;">No tee times posted yet</p>
          <p style="font-size:0.85rem;color:var(--text-muted);">Pairings are posted each Wednesday before the tournament. Check back closer to the event date.</p>
        </div>`;
    } else {
      document.getElementById('tt-title').textContent = active.event;
      document.getElementById('tt-meta').innerHTML = [
        { lbl: 'Date',      val: GolfFmt.long(active.date) },
        { lbl: 'Course',    val: active.course },
        { lbl: 'Format',    val: active.format },
        { lbl: 'First Tee', val: GolfFmt.time(active.startTime) },
      ].map(i => `<div class="event-meta-item"><span class="lbl">${i.lbl}</span><span class="val">${i.val}</span></div>`).join('');

      document.getElementById('tt-groups').innerHTML = renderGroups(active);
    }

  }).catch(() => {
    document.getElementById('event-card').style.display = 'none';
    document.getElementById('tt-groups').innerHTML = '<p style="color:var(--text-muted);">Pairings will appear here each Wednesday before the tournament.</p>';
  });
</script>
</body>
</html>
