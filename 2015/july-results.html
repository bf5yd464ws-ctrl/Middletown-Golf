<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>July 2015 Results — Middletown Area Golf Association</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div id="app-header"></div>
<section class="page-hero">
  <div class="container">
    <h1>July 2015 Results</h1>
    <p>Monthly Tournament</p>
  </div>
</section>
<main class="page-content">
  <div class="container">
    <div class="page-breadcrumb">
      <a href="../results.html">Results</a>
      <span class="sep">/</span>
      <a href="season.html">2015</a>
      <span class="sep">/</span>
      <span>July</span>
    </div>
    <div class="card mb-3">
      <div class="card-head"><h2>July 2015 Tournament</h2></div>
      <div class="card-body">
        <div class="event-meta">
          <div class="event-meta-item"><span class="lbl">Format</span><span class="val">Best Ball</span></div>

      </div>
    </div>
    <div class="section-head"><h2>Team Results</h2></div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>Place</th><th>Players</th><th>Score/Net</th><th>Payout</th></tr></thead>
        <tbody>
          <tr><td colspan="4" style="text-align:center;padding:2rem;color:#999;">Data pending</td></tr>
        </tbody>
      </table>
    </div>
    <div class="divider"></div>
    <div style="display:flex;gap:1rem;justify-content:center;margin:2rem 0;">
      <a href="june-results.html" class="btn btn-outline">Previous</a>

<div id="app-footer"></div>
<script src="../js/nav.js"></script>

</html>
